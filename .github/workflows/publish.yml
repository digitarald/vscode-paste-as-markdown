name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run compile

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-update-package-json
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx ovsx publish --no-update-package-json
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        if: env.OVSX_PAT != ''
